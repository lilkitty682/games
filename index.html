<!DOCTYPE html>
<html>
<body style="margin:0;background:#111;">

<button id="start" style="position:absolute;opacity:0;">start</button>

<script>
let cloaked = false;

function cloakPage() {
    if (cloaked) return;
    cloaked = true;

    const newTab = window.open('', '_blank');
    if (!newTab) return;

    const cloakedHTML = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<script>
// ✅ INSTANT anti-close (runs BEFORE anything else)
window.onbeforeunload = function(e){
    e.preventDefault();
    e.returnValue = '';
};
<\/script>

<style>
html,body{margin:0;height:100%;background:#111;color:#fff;font-family:sans-serif;}
#home{display:flex;flex-direction:column;align-items:center;padding:20px;}
#grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;width:90%;max-width:1000px;}
.tile{background:#222;border-radius:8px;text-align:center;cursor:pointer;}
.tile img{width:100%;height:120px;object-fit:cover;}
#game{display:none;position:relative;height:100vh;}
#frame{position:absolute;width:100%;height:100%;border:0;}
#overlay{position:absolute;background:black;z-index:10;}
#back{position:absolute;top:10px;left:10px;z-index:20;}
</style>
</head>

<body>

<div id="home">
<div id="grid">
<div class="tile" onclick="openGame('https://dgames.online/embed/slope')">
<img src="image.jfif"><span>Slope</span>
</div>
<div class="tile" onclick="openGame('https://dgames.online/embed/tetris-ultra')">
<img src="image.jfif"><span>Tetris</span>
</div>
</div>
</div>

<div id="game">
<button id="back" onclick="goBack()">Back</button>
<iframe id="frame"></iframe>
<div id="overlay"></div>
</div>

<script>
function updateOverlay(){
    const rect=frame.getBoundingClientRect();
    overlay.style.width=rect.width+'px';
    overlay.style.height='60px';
    overlay.style.left=rect.left+'px';
    overlay.style.bottom=(window.innerHeight-rect.bottom)+'px';
}
window.addEventListener('resize',updateOverlay);

function openGame(url){
    frame.src=url;
    home.style.display='none';
    game.style.display='block';
    setTimeout(updateOverlay,50);
}

function goBack(){
    frame.src='';
    game.style.display='none';
    home.style.display='flex';
}
<\/script>

</body>
</html>
`;

    // inject instantly
    newTab.document.open();
    newTab.document.write(cloakedHTML);
    newTab.document.close();

    // close original tab reliably
    setTimeout(()=>{
        window.open('', '_self');
        window.close();
    },50);
}

// ✅ AUTO trigger (works like instant)
window.onload = () => {
    document.getElementById('start').click();
};

document.getElementById('start').onclick = cloakPage;
</script>

</body>
</html>
