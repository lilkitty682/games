<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: sans-serif;
    background: #111;
    color: #fff;
    overflow: hidden;
}
#home-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}
#search-bar {
    width: 80%;
    max-width: 500px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-bottom: 20px;
}
#game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
    width: 90%;
    max-width: 1000px;
}
.game-tile {
    background: #222;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    text-align: center;
    transition: transform 0.2s;
}
.game-tile:hover {
    transform: scale(1.05);
}
.game-tile img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
}
.game-tile span {
    display: block;
    padding: 5px;
}
#game-screen {
    display: none;
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.5s;
}
#game-screen.show {
    opacity: 1;
}
#game-frame {
    width: 100%;
    height: 100%;
    border: none;
}
#bottom-overlay {
    position: absolute;
    background: black;
    z-index: 15;
}
#bottom-bar {
    position: absolute;
    bottom: 0;
    right: 0;
    padding: 5px 10px;
    z-index: 20;
}
#bottom-bar button {
    background: #333;
    border: none;
    color: white;
    padding: 5px 10px;
    margin-left: 5px;
    cursor: pointer;
    border-radius: 4px;
}
#back-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 20;
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: rgba(0,0,0,0.7);
    color: #fff;
}
@media (max-width: 600px) {
    .game-tile img { height: 100px; }
    #back-btn { font-size: 14px; padding: 8px 12px; }
    #bottom-bar button { padding: 4px 8px; font-size: 12px; }
}
</style>
</head>
<body>

<div id="home-screen">
    <input type="text" id="search-bar" placeholder="Search games...">
    <div id="game-grid">
        <div class="game-tile" data-url="https://dgames.online/embed/slope">
            <img src="image.jfif" alt="Slope">
            <span>Slope</span>
        </div>
        <div class="game-tile" data-html='<iframe src="https://dgames.online/embed/tetris-ultra" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>'>
            <img src="image.jfif" alt="Tetris Ultra">
            <span>Tetris Ultra</span>
        </div>
    </div>
</div>

<div id="game-screen">
    <button id="back-btn">Back</button>
    <iframe id="game-frame" src="" allowfullscreen></iframe>
    <div id="bottom-overlay"></div>
    <div id="bottom-bar">
        <button id="light-mode-btn">Light</button>
        <button id="dark-mode-btn">Dark</button>
    </div>
</div>

<script>
// Search bar filtering
const searchInput = document.getElementById('search-bar');
const tiles = document.querySelectorAll('.game-tile');
searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase();
    tiles.forEach(tile => {
        const title = tile.querySelector('span').innerText.toLowerCase();
        tile.style.display = title.includes(query) ? 'block' : 'none';
    });
});

// Update overlay position dynamically
function updateOverlay() {
    const iframe = document.getElementById('game-frame');
    const overlay = document.getElementById('bottom-overlay');
    if (!iframe || !overlay) return;
    const rect = iframe.getBoundingClientRect();
    overlay.style.width = rect.width + 'px';
    overlay.style.height = '50px'; // minimum height
    overlay.style.left = rect.left + 'px';
    overlay.style.bottom = window.innerHeight - rect.bottom + 'px';
}

// Click on game tiles
tiles.forEach(tile => {
    tile.addEventListener('click', () => {
        const iframe = document.getElementById('game-frame');
        const url = tile.getAttribute('data-url');
        const htmlEmbed = tile.getAttribute('data-html');

        if(url) iframe.src = url;
        else if(htmlEmbed) {
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(htmlEmbed);
            doc.close();
        }

        document.getElementById('home-screen').style.display = 'none';
        const gameScreen = document.getElementById('game-screen');
        gameScreen.style.display = 'block';
        setTimeout(()=> {
            gameScreen.classList.add('show');
            updateOverlay();
        }, 50);
    });
});

// Back button
document.getElementById('back-btn').addEventListener('click', () => {
    const iframe = document.getElementById('game-frame');
    iframe.src = '';
    document.getElementById('game-screen').classList.remove('show');
    setTimeout(()=>{
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
    }, 500);
});

// Light/Dark Mode
const lightBtn = document.getElementById('light-mode-btn');
const darkBtn = document.getElementById('dark-mode-btn');

lightBtn.addEventListener('click', ()=>{
    document.body.style.background = '#fff';
    document.body.style.color = '#000';
});
darkBtn.addEventListener('click', ()=>{
    document.body.style.background = '#111';
    document.body.style.color = '#fff';
});

// Update overlay on resize to fix horizontal and vertical scaling
window.addEventListener('resize', updateOverlay);
</script>
</body>
</html>
