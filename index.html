<script>
let cloaked = false;

function cloakPage() {
    if (cloaked) return;
    cloaked = true;

    const newTab = window.open('about:blank', '_blank');
    if (!newTab) return;

    const cloakedHTML = `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

/* Home */
#home-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

#search-bar {
    width: 80%;
    max-width: 500px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-bottom: 20px;
}

/* Grid */
#game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
    width: 90%;
    max-width: 1000px;
}

.game-tile {
    background: #222;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    text-align: center;
    transition: transform 0.2s;
}

.game-tile:hover {
    transform: scale(1.05);
}

.game-tile img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.game-tile span {
    display: block;
    padding: 5px;
}

/* Game screen */
#game-screen {
    display: none;
    position: relative;
    width: 100%;
    height: 100vh;
    opacity: 0;
    transition: opacity 0.4s ease;
}

#game-screen.active {
    opacity: 1;
}

/* Game iframe */
#game-frame {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 0;
}

/* Bottom bar */
#bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4.44444444%;
    background: black;
    z-index: 10;
}

/* Back button (on top of bar) */
#back-btn {
    position: absolute;
    bottom: 6px;
    left: 10px;
    z-index: 20;
    padding: 8px 14px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    backdrop-filter: blur(4px);
}
</style>
</head>

<body>

<div id="home-screen">
    <input type="text" id="search-bar" placeholder="Search games...">

    <div id="game-grid">
        <div class="game-tile" data-html='
<style>
html,body{margin:0;height:100%;overflow:hidden;}
iframe{width:100%;height:100%;border:0;}
</style>
<iframe src="https://dgames.online/embed/slope" allowfullscreen></iframe>
'>
            <img src="image.jfif">
            <span>Slope</span>
        </div>

        <div class="game-tile" data-html='
<style>
html,body{margin:0;height:100%;overflow:hidden;}
iframe{width:100%;height:100%;border:0;}
</style>
<iframe src="https://dgames.online/embed/tetris-ultra" allowfullscreen></iframe>
'>
            <img src="image.jfif">
            <span>Tetris Ultra</span>
        </div>
    </div>
</div>

<div id="game-screen">
    <iframe id="game-frame"></iframe>
    <div id="bottom-bar"></div>
    <button id="back-btn">Back</button>
</div>

<script>
// Anti-close
window.addEventListener("beforeunload", function(e){
    e.preventDefault();
    e.returnValue = "";
});

// Search
const searchInput = document.getElementById("search-bar");
const tiles = document.querySelectorAll(".game-tile");

searchInput.addEventListener("input", function(){
    const query = this.value.toLowerCase();
    tiles.forEach(tile=>{
        const title = tile.querySelector("span").innerText.toLowerCase();
        tile.style.display = title.includes(query) ? "block" : "none";
    });
});

// Open game with fade
tiles.forEach(tile=>{
    tile.addEventListener("click", ()=>{
        const iframe = document.getElementById("game-frame");
        const htmlCode = tile.getAttribute("data-html");

        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(htmlCode);
        doc.close();

        document.getElementById("home-screen").style.display = "none";
        const gameScreen = document.getElementById("game-screen");
        gameScreen.style.display = "block";

        // trigger fade
        setTimeout(()=>gameScreen.classList.add("active"), 10);
    });
});

// Back button
document.getElementById("back-btn").addEventListener("click", ()=>{
    const iframe = document.getElementById("game-frame");

    iframe.src = "";
    iframe.contentWindow.document.open();
    iframe.contentWindow.document.close();

    const gameScreen = document.getElementById("game-screen");
    gameScreen.classList.remove("active");

    setTimeout(()=>{
        gameScreen.style.display = "none";
        document.getElementById("home-screen").style.display = "flex";
    }, 300);
});
<\/script>

</body>
</html>
`;

    newTab.document.open();
    newTab.document.write(cloakedHTML);
    newTab.document.close();

    setTimeout(() => {
        window.close();
        document.body.innerHTML = "";
        document.body.style.background = "#000";
    }, 100);
}

// Trigger cloaking
document.addEventListener("click", cloakPage, { once: true });
</script>
