<script>
let cloaked = false;

function cloakPage() {
    if (cloaked) return;
    cloaked = true;

    const newTab = window.open('about:blank', '_blank');
    if (!newTab) return;

    const cloakedHTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: sans-serif;
    background: #111;
    color: #fff;
    overflow: hidden;
}

#home-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

#search-bar {
    width: 80%;
    max-width: 500px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-bottom: 20px;
}

#game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
    width: 90%;
    max-width: 1000px;
}

.game-tile {
    background: #222;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    text-align: center;
    transition: transform 0.2s;
}

.game-tile:hover {
    transform: scale(1.05);
}

.game-tile img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.game-tile span {
    display: block;
    padding: 5px;
}

/* Game screen */
#game-screen {
    display: none;
    position: relative;
    width: 100%;
    height: 100vh;
    opacity: 0;
    transition: opacity 0.4s ease;
}

#game-screen.show {
    opacity: 1;
}

#game-frame {
    width: 100%;
    height: 100%;
    border: none;
}

/* Overlay that hides DGAMES footer */
#bottom-overlay {
    position: absolute;
    background: black;
    z-index: 15;
}

/* Bottom controls */
#bottom-bar {
    position: absolute;
    bottom: 0;
    right: 0;
    padding: 5px 10px;
    z-index: 20;
}

#bottom-bar button {
    background: #333;
    border: none;
    color: white;
    padding: 5px 10px;
    margin-left: 5px;
    cursor: pointer;
    border-radius: 4px;
}

/* Back button */
#back-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 20;
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: rgba(0,0,0,0.7);
    color: #fff;
}
</style>
</head>

<body>

<div id="home-screen">
    <input type="text" id="search-bar" placeholder="Search games...">
    <div id="game-grid">

        <div class="game-tile" data-url="https://dgames.online/embed/slope">
            <img src="image.jfif">
            <span>Slope</span>
        </div>

        <div class="game-tile" data-html='<iframe src="https://dgames.online/embed/tetris-ultra" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>'>
            <img src="image.jfif">
            <span>Tetris Ultra</span>
        </div>

    </div>
</div>

<div id="game-screen">
    <button id="back-btn">Back</button>
    <iframe id="game-frame"></iframe>
    <div id="bottom-overlay"></div>

    <div id="bottom-bar">
        <button id="light-mode-btn">Light</button>
        <button id="dark-mode-btn">Dark</button>
    </div>
</div>

<script>
// Anti-close (only applies to cloaked tab)
window.addEventListener("beforeunload", function(e){
    e.preventDefault();
    e.returnValue = "";
});

// Search
const searchInput = document.getElementById('search-bar');
const tiles = document.querySelectorAll('.game-tile');

searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase();
    tiles.forEach(tile => {
        const title = tile.querySelector('span').innerText.toLowerCase();
        tile.style.display = title.includes(query) ? 'block' : 'none';
    });
});

// Overlay sizing fix
function updateOverlay() {
    const iframe = document.getElementById('game-frame');
    const overlay = document.getElementById('bottom-overlay');
    if (!iframe || !overlay) return;

    const rect = iframe.getBoundingClientRect();
    overlay.style.width = rect.width + 'px';
    overlay.style.height = '50px';
    overlay.style.left = rect.left + 'px';
    overlay.style.bottom = (window.innerHeight - rect.bottom) + 'px';
}

// Open game
tiles.forEach(tile => {
    tile.addEventListener('click', () => {
        const iframe = document.getElementById('game-frame');
        const url = tile.getAttribute('data-url');
        const html = tile.getAttribute('data-html');

        if (url) iframe.src = url;
        else if (html) {
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(html);
            doc.close();
        }

        document.getElementById('home-screen').style.display = 'none';
        const gs = document.getElementById('game-screen');
        gs.style.display = 'block';

        setTimeout(() => {
            gs.classList.add('show');
            updateOverlay();
        }, 50);
    });
});

// Back
document.getElementById('back-btn').addEventListener('click', () => {
    const iframe = document.getElementById('game-frame');
    iframe.src = "";

    const gs = document.getElementById('game-screen');
    gs.classList.remove('show');

    setTimeout(() => {
        gs.style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
    }, 400);
});

// Light/Dark
document.getElementById('light-mode-btn').onclick = () => {
    document.body.style.background = '#fff';
    document.body.style.color = '#000';
};

document.getElementById('dark-mode-btn').onclick = () => {
    document.body.style.background = '#111';
    document.body.style.color = '#fff';
};

window.addEventListener('resize', updateOverlay);
<\/script>

</body>
</html>`;

    // Inject into about:blank
    newTab.document.open();
    newTab.document.write(cloakedHTML);
    newTab.document.close();

    // Close original tab (fallback if blocked)
    setTimeout(() => {
        window.open('', '_self');
        window.close();
    }, 100);
}

// Trigger on first click
document.addEventListener('click', cloakPage, { once: true });
</script>
