<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Launcher</title>
</head>
<body style="margin:0;background:#111;">

<script>
let cloaked = false;

function cloakPage() {
if (cloaked) return;
cloaked = true;

const newTab = window.open('about:blank','_blank');
if (!newTab) return;

const cloakedHTML = `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;background:#111;color:#fff;overflow:hidden;transition:.3s;}

body.light{background:#f5f5f5;color:#111;}

#home{display:flex;flex-direction:column;align-items:center;padding:20px;}
#search{width:80%;max-width:500px;padding:10px;border-radius:8px;border:none;margin-bottom:10px;}

#topbar{position:absolute;top:10px;right:10px;z-index:50;}
#topbar button{margin-left:5px;padding:6px 10px;border:none;border-radius:5px;cursor:pointer;}

#grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;width:90%;max-width:1000px;}

.tile{background:#222;border-radius:8px;cursor:pointer;text-align:center;overflow:hidden;transition:.2s;}
.tile:hover{transform:scale(1.05);}
.tile img{width:100%;height:120px;object-fit:cover;}
.tile span{display:block;padding:5px;}

#game{display:none;position:relative;width:100%;height:100vh;opacity:0;transition:.4s;}
#game.show{opacity:1;}

#frame{position:absolute;top:0;left:0;width:100%;height:100%;border:0;display:block;}

#overlay{position:absolute;background:black;z-index:15;}

#bar{position:absolute;bottom:0;right:0;z-index:20;padding:5px;}
#bar button{margin-left:5px;padding:5px;border:none;border-radius:4px;cursor:pointer;}

#back{position:absolute;top:10px;left:10px;z-index:20;padding:8px 12px;border:none;border-radius:5px;background:rgba(0,0,0,.7);color:#fff;cursor:pointer;}

#addPanel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
display:none;
z-index:100;
width:300px;
}
#addPanel input{
width:100%;
margin-bottom:10px;
padding:8px;
border:none;
border-radius:5px;
}
#addPanel button{width:100%;padding:8px;}

@media(max-width:600px){
.tile img{height:100px;}
}
</style>
</head>

<body>

<div id="home">
<input id="search" placeholder="Search games...">

<div id="topbar">
<button id="modeBtn">🌙</button>
<button onclick="openAdd()">＋</button>
</div>

<div id="grid"></div>
</div>

<div id="game">
<button id="back">Back</button>
<iframe id="frame"></iframe>
<div id="overlay"></div>

<div id="bar">
<button id="modeBtn2">🌙</button>
</div>
</div>

<div id="addPanel">
<input id="title" placeholder="Game name">
<input id="link" placeholder="Paste URL or embed">
<button onclick="addGame()">Add Game</button>
</div>

<script>

// --- MODE ---
function toggleMode(){
document.body.classList.toggle("light");
const icon=document.body.classList.contains("light")?"🌞":"🌙";
modeBtn.textContent=icon;
modeBtn2.textContent=icon;
}
modeBtn.onclick=toggleMode;
modeBtn2.onclick=toggleMode;

// --- STORAGE ---
let games = JSON.parse(localStorage.getItem("games")||"[]");

// default games
if(games.length===0){
games=[
{title:"Slope",url:"https://dgames.online/embed/slope"},
{title:"Tetris Ultra",url:"https://dgames.online/embed/tetris-ultra"}
];
}

// --- RENDER ---
function render(){
grid.innerHTML="";
games.forEach((g,i)=>{
const d=document.createElement("div");
d.className="tile";
d.innerHTML="<img src='image.jfif'><span>"+g.title+"</span>";
d.onclick=()=>openGame(g.url);
grid.appendChild(d);
});
}
render();

// --- ADD UI ---
function openAdd(){ addPanel.style.display="block"; }

function addGame(){
let title=document.getElementById("title").value;
let input=document.getElementById("link").value;

let url=input;

// auto extract iframe src
const match=input.match(/src="([^"]+)"/);
if(match) url=match[1];

games.push({title,url});
localStorage.setItem("games",JSON.stringify(games));

addPanel.style.display="none";
render();
}

// --- SEARCH ---
search.oninput=()=>{
const q=search.value.toLowerCase();
document.querySelectorAll(".tile").forEach(t=>{
t.style.display=t.innerText.toLowerCase().includes(q)?"block":"none";
});
};

// --- OVERLAY FIX ---
function updateOverlay(){
const rect=frame.getBoundingClientRect();
overlay.style.width=rect.width+"px";
overlay.style.height="60px";
overlay.style.left=rect.left+"px";
overlay.style.bottom=(window.innerHeight-rect.bottom)+"px";
}
window.addEventListener("resize",updateOverlay);

// --- OPEN GAME ---
function openGame(url){
frame.src=url;

home.style.display="none";
game.style.display="block";

setTimeout(()=>{
game.classList.add("show");
updateOverlay();
},50);
}

// --- BACK ---
back.onclick=()=>{
frame.src="";
game.classList.remove("show");

setTimeout(()=>{
game.style.display="none";
home.style.display="flex";
},300);
};

// --- ANTI CLOSE ---
window.addEventListener("beforeunload",e=>{
e.preventDefault();
e.returnValue="";
});

<\/script>

</body>
</html>
`;

newTab.document.open();
newTab.document.write(cloakedHTML);
newTab.document.close();

setTimeout(()=>{
window.open('about:blank','_self');
window.close();
},100);
}

document.addEventListener('click',cloakPage,{once:true});
</script>

</body>
</html>
