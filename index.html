<script>
let cloaked = false;

function cloakPage() {
    if (cloaked) return;
    cloaked = true;

    const newTab = window.open('about:blank', '_blank');
    if (!newTab) return;

    // Build the full HTML for the cloaked tab manually
    const cloakedHTML = `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}
#home-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}
#search-bar {
    width: 80%;
    max-width: 500px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-bottom: 20px;
}
#game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
    width: 90%;
    max-width: 1000px;
}
.game-tile {
    background: #222;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    text-align: center;
    transition: transform 0.2s;
}
.game-tile:hover {
    transform: scale(1.05);
}
.game-tile img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
}
.game-tile span {
    display: block;
    padding: 5px;
}
#game-screen {
    display: none;
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}
#game-screen iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
}
#back-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: rgba(0,0,0,0.7);
    color: #fff;
}
@media (max-width: 600px) {
    .game-tile img {
        height: 100px;
    }
    #back-btn {
        font-size: 14px;
        padding: 8px 12px;
    }
}
</style>
</head>
<body>

<div id="home-screen">
    <input type="text" id="search-bar" placeholder="Search games...">
    <div id="game-grid">
<div id="game-grid">
    <div class="game-tile" data-url="https://dgames.online/embed/slope">
        <img src="image.jfif" alt="Slope">
        <span>Slope</span>
    </div>

    <div class="game-tile" data-url='<iframe src="https://dgames.online/embed/tetris-ultra" width="800" height="600" frameborder="0" allowfullscreen></iframe>'>
        <img src="image.jfif" alt="Tetris Ultra">
        <span>Tetris Ultra</span>
    </div>
</div>
    </div>
</div>

<div id="game-screen">
    <button id="back-btn">Back</button>
    <iframe id="game-frame" src="" allowfullscreen></iframe>
</div>

<script>
// Anti-close prompt for the cloaked tab
window.addEventListener('beforeunload', function(e) {
    e.preventDefault();
    e.returnValue = '';
});

// Search functionality
const searchInput = document.getElementById('search-bar');
const tiles = document.querySelectorAll('.game-tile');
searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase();
    tiles.forEach(tile => {
        const title = tile.querySelector('span').innerText.toLowerCase();
        tile.style.display = title.includes(query) ? 'block' : 'none';
    });
});

// Click on game tiles
tiles.forEach(tile => {
    tile.addEventListener('click', () => {
        const url = tile.getAttribute('data-url');
        const iframe = document.getElementById('game-frame');
        iframe.src = url;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
    });
});

// Back button
document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('game-frame').src = '';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('home-screen').style.display = 'flex';
});
<\/script>

</body>
</html>
`;

    // Write HTML into the new tab
    newTab.document.open();
    newTab.document.write(cloakedHTML);
    newTab.document.close();

    // Close the original tab
    setTimeout(() => window.close(), 100);
}

// Trigger cloaking on first click
document.addEventListener('click', cloakPage, { once: true });
</script>
